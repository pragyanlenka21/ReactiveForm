<div class="container">
    <form [formGroup]="myFormGroup">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" formControlName="name" placeholder="Enter Name">
        </div>
        <div class="mb-3">
            <label for="dept" class="form-label">Department</label>
            <input type="text" class="form-control" id="dept" formControlName="department"
                placeholder="Enter Department">
        </div>
        <div class="mb-3">
            <label class="form-label">Salary</label>
            <input type="text" class="form-control" formControlName="salary" placeholder="Enter Salary">
        </div>
        <button type="submit" class="btn btn-primary" (click)="submitForm()">Submit</button>
    </form>

    <div class="card mt-3">
        <form [formGroup]="filterForm">
            <div class="">
                <input type="text" class="form-control" id="dept" formControlName="search" placeholder="Enter Search"
                    (input)="valueChanges($event)">
            </div>
        </form>
    </div>


    <table class="table table-striped table-bordered mt-3">
        <thead>
            <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let data of storeData; let i = index">
                <td>{{data.name}}</td>
                <td>{{data.department}}</td>
                <td>{{data.salary}}</td>
                <td>
                    <button type="button" class="btn btn-danger btn-sm me-2" (click)="deleteRow(i)">
                        <i class="bi bi-trash"></i>
                    </button>

                    <button type="button" class="btn btn-primary btn-sm" (click)="open(editForm, i)">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

</div>


<ng-template #editForm let-c="close" let-d="dismiss">
    <div class="modal-header">
        <h4 class="modal-title" id="modal-basic-title">Edit Form</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="d('Cross click')"></button>
    </div>
    <div class="modal-body">
        <form [formGroup]="myEditFormGroup">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" formControlName="name" placeholder="Enter Name">
            </div>
            <div class="mb-3">
                <label for="dept" class="form-label">Department</label>
                <input type="text" class="form-control" id="dept" formControlName="department"
                    placeholder="Enter Department">
            </div>
            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="text" class="form-control" formControlName="salary" placeholder="Enter Salary">
            </div>

        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-primary" (click)="editFormSubmit()">Submit</button>
    </div>
</ng-template>
